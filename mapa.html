<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel Map OSM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Press Start 2P', cursive;
  background: #cf0000;
  
  position: absolute; top: 0; right: 0; bottom: 0; left: 0;
}

#map {
  width: 100vw;
  height: 100vh;
  image-rendering: pixelated;
  filter: contrast(1.1) saturate(.8);
  position: absolute; top: 0; right: 0; bottom: 0; left: 0;
}

button {
  font-family: 'Press Start 2P', cursive;
  font-size: 8px;
  border: 2px solid #020202;
  border-radius: 4px;
  background: #974c4c;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #6b0707;
  border-color: #aaa;
}

#loading {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: rgba(0,0,0,.85);
  border: 3px solid #940707;
  color: #7CFC00;
  font-family: 'Press Start 2P', cursive;
  font-size: 8px;
  padding: 10px 16px;
  display: none;
}

#leyenda {
  position: absolute;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  background: rgba(0,0,0,.85);
  border: 4px solid #9e0808;
  color: white;
  padding: 30px;
  font-size: 7px;
  line-height: 2;
}

#leyenda .ley-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

#leyenda img {
  image-rendering: pixelated;
  width: 18px;
  height: 18px;
  object-fit: cover;
}

.leaflet-popup-content-wrapper {
  background: #3a0202e5;
  border: 3px solid #bb0303;
  border-radius: 0;
  color: white;
  box-shadow: 3px 3px 0 #000;
}

.leaflet-popup-tip { background: #000000; }
.leaflet-popup-content { margin: 10px 14px; }

#categoriaBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 1000;
  width: auto;
  padding: 6px 10px;
}

#btnMarcador{
  position: absolute;
  top: 10px;
  right: 90px;
  z-index: 1000;
  width: auto;
  padding: 6px 10px;
}

/* ── Overlay / Modal ── */
#overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
}

#overlay.open {
  display: flex;
}

.modal {
  background: #0d0d0d;
  border: 4px solid #8b0000;
  width: 300px;
  position: relative;
  font-family: 'Press Start 2P', cursive;
}

.modal-top-bar {
  background: #8b0000;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#modal-bar-title {
  font-size: 7px;
  color: #fff;
  letter-spacing: 1px;
}

#modal-close-btn {
  background: #ff2222;
  border: 2px solid #fff;
  color: #fff;
  font-family: 'Press Start 2P', cursive;
  font-size: 8px;
  width: 22px;
  height: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

#modal-close-btn:hover { background: #cc0000; }

.modal-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
  image-rendering: pixelated;
  filter: contrast(1.1) saturate(0.85);
  border-bottom: 3px solid #8b0000;
}

.modal-img-placeholder {
  width: 100%;
  height: 180px;
  background: #1a1a1a;
  border-bottom: 3px solid #8b0000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
}

.modal-body { padding: 14px; }

#modal-cat {
  font-size: 10px;
  color: #8b0000;
  letter-spacing: 2px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

#modal-name {
  font-size: 20px;
  color: #7CFC00;
  margin-bottom: 10px;
  line-height: 1.6;
}

#modal-desc {
  font-size: 7px;
  color: #bbb;
  line-height: 1.9;
  border-left: 3px solid #8b0000;
  padding-left: 8px;
}

.modal-footer {
  border-top: 2px solid #222;
  padding: 10px 14px;
  display: flex;
  gap: 8px;
}

.modal-footer button {
  font-size: 6px;
  padding: 6px 10px;
  flex: 1;
  display: block;
  width: auto;
}

.modal-footer .btn-primary {
  border-color: #7CFC00;
  color: #7CFC00;
  background: #1a1a1a;
}

.modal-footer .btn-primary:hover {
  background: #7CFC00;
  color: #000;
  border-color: #7CFC00;
}

/* Esquinas pixel */
.pixel-corner {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #ff2222;
}
.pc-tl { top: -1px; left: -1px; }
.pc-tr { top: -1px; right: -1px; }
.pc-bl { bottom: -1px; left: -1px; }
.pc-br { bottom: -1px; right: -1px; }
</style>
</head>

<body>

<div id="loading">⏳ Generando terreno...</div>

<button id="categoriaBtn">
  <img width="40" height="40" src="https://img.icons8.com/ios/50/FFFFFF/menu--v1.png" alt="menu"/>
</button>

<div id="leyenda" style="display:none">
  <div style="font-size:15px;margin-bottom:8px;color:#ff0000">Categoria</div>
  <div class="ley-row"><img src="https://pbs.twimg.com/media/GZvlAwaagAABbPx.jpg"> Restaurante</div>
  <div class="ley-row"><img src="https://pbs.twimg.com/media/GjnTdKDXAAA0C7v.jpg"> Café Teto</div>
  <div class="ley-row"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTz3OvSdpqrlsghf9oHIM2J2dE-edzVoBaQ8A&s"> Bar</div>
  <div class="ley-row"><img src="https://www.dondeir.com/wp-content/uploads/2024/05/vocaloid-exposicion-cdmx.jpg"> Museo</div>
  <div class="ley-row"><img src="https://i.pinimg.com/236x/e1/1b/0a/e11b0a9e77d9a1b405cc119d806424cf.jpg"> Hotel</div>
  <div class="ley-row"><img src="https://preview.redd.it/why-do-yall-call-this-teto-dr-kidori-v0-dm5b7fgbtv2f1.jpeg?auto=webp&s=96c454d243c914a9707218c50275e0aad4f1f95b"> Hospital</div>
  <div class="ley-row"><img src="https://preview.redd.it/highschool-teto-v0-tz6md2by5jhf1.png?width=1300&format=png&auto=webp&s=4555235838e1046f37f7402bad664930c82cda84"> Escuela</div>
  <div class="ley-row"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbl1hwNUCk2XfGoFEOD5Ks4_iGspSNjaqbYw&s"> Histórico</div>
  <div class="ley-row"><img src="https://preview.redd.it/any-guide-on-what-to-do-when-your-teto-plush-started-talking-v0-g890tf0bp8df1.png?auto=webp&s=20d8409b87280f54ed1965e3e4a9ba6303b2eac1"> Banco</div>
</div>

<div id="map"></div>

<!-- ── Modal overlay ── -->
<div id="overlay">
  <div class="modal">
    <div class="pixel-corner pc-tl"></div>
    <div class="pixel-corner pc-tr"></div>
    <div class="pixel-corner pc-bl"></div>
    <div class="pixel-corner pc-br"></div>
    <div class="modal-top-bar">
      <span id="modal-bar-title">INFO</span>
      <button id="modal-close-btn" onclick="closeOverlay()">X</button>
    </div>
    <div id="modal-media"></div>
    <div class="modal-body">
      <div id="modal-cat">Categoría</div>
      <div id="modal-name">Nombre</div>
      <div id="modal-desc">Descripción</div>
    </div>
    <div class="modal-footer">
      <button onclick="closeOverlay()">Cerrar</button>
    </div>
  </div>
</div>
<button id="btnMarcador">Agregar marcador</button>
<script src="./js/map.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
  
  // ¡IMPORTANTE! Faltaban estas importaciones para Firestore y Auth
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB4mh596cy9fYC1Bk4TTIj08KDEvxeOEG4",
    authDomain: "someamap.firebaseapp.com",
    projectId: "someamap",
    storageBucket: "someamap.firebasestorage.app",
    messagingSenderId: "852849979745",
    appId: "1:852849979745:web:d3b064a6aa2231919a1520",
    measurementId: "G-BSSN3MLPSB"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Iniciar sesión anónima para poder escribir en la base de datos
  signInAnonymously(auth).catch((error) => {
    console.error("Error de autenticación:", error);
  });

  // EXPONER LA FUNCIÓN AL OBJETO WINDOW PARA QUE map.js PUEDA USARLA
  window.guardarMarcadorFirebase = async function(title, cat, imgURL, desc, lat, lng) {
    try {
      await addDoc(collection(db, "markers"), {
        title: title,
        cat: cat,
        desc: desc,
        img: imgURL,
        lat: lat,
        lng: lng,
        uid: auth.currentUser.uid,
        createdAt: Date.now()
      });
      console.log("Marcador guardado en Firebase con éxito.");
    } catch (e) {
      console.error("Error al añadir el documento: ", e);
    }
  };

  // Escuchar marcadores en tiempo real
  onSnapshot(collection(db, "markers"), (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      if (change.type === "added") {
        const markerData = change.doc.data();
        
        // Aquí agregas el marcador directamente al mapa de Leaflet
        // Usamos el icono default que ya tienes en map.js (asegúrate de que addMarker esté adaptado o usa L.marker)
        if (window.L && window.map) {
           const marker = window.L.marker([markerData.lat, markerData.lng]).addTo(window.map);
           marker.on('click', () => {
             // Reutiliza tu función openOverlay de map.js
             window.openOverlay({
               title: markerData.title,
               cat: markerData.cat,
               desc: markerData.desc,
               img: markerData.img || ''
             });
           });
        }
      }
    });
  });
</script>
</body>
</html>
