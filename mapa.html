<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voxel Map OSM</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
rel="stylesheet">

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:'Press Start 2P', cursive;
    background:#222;
}

#map{
    width:100vw;
    height:100vh;

    image-rendering: pixelated;

    filter:
        contrast(1.1)
        saturate(.8);
}

/* UI estilo Minecraft */
.panel{
    position:absolute;

    top:20px;
    left:20px;

    z-index:1000;

    background:rgba(0,0,0,.7);

    border:4px solid #555;

    color:white;

    padding:15px;
}

button{
    margin-top:10px;

    font-family:'Press Start 2P', cursive;

    padding:10px;

    border:none;

    background:#7a4f24;

    color:white;

    cursor:pointer;
}

button:hover{
    background:#96652f;
}

</style>
</head>

<body>

<div class="panel">
    <div>VOXEL MAP</div>

    <button>
        Change Biome
    </button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView(
    [32.6245, -115.4523],
    13
);

/* mapa normal */
const normalLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
);

/* mapa oscuro */
const darkLayer = L.tileLayer(
'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png',
{
    attribution:'© Stadia Maps'
}
);

normalLayer.addTo(map);

let dark = false;

/* cambiar bioma */

const playerIcon = L.icon({

    iconUrl:
    'https://i.pinimg.com/originals/80/23/9d/80239d4ac2c183b7f35586a425dd324f.png',

    iconSize:[48,48]
});

L.marker(
    [32.6245, -115.4523],
    { icon: playerIcon }

).addTo(map);

function onMapClick(e) {
    alert("You clicked the map at " + e.latlng);
}

map.on('click', onMapClick);

</script>

</body>
</html>
