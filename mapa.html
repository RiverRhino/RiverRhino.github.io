<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel Map OSM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Press Start 2P', cursive;
  background: #cf0000;
}

#map {
  width: 100vw;
  height: 100vh;
  image-rendering: pixelated;
  filter: contrast(1.1) saturate(.8);
}

button {
  font-family: 'Press Start 2P', cursive;
  font-size: 8px;
  border: 2px solid #020202;
  border-radius: 4px;
  background: #974c4c;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #6b0707;
  border-color: #aaa;
}

#loading {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: rgba(0,0,0,.85);
  border: 3px solid #940707;
  color: #7CFC00;
  font-family: 'Press Start 2P', cursive;
  font-size: 8px;
  padding: 10px 16px;
  display: none;
}

#leyenda {
  position: absolute;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  background: rgba(0,0,0,.85);
  border: 4px solid #9e0808;
  color: white;
  padding: 30px;
  font-size: 7px;
  line-height: 2;
}

#leyenda .ley-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

#leyenda img {
  image-rendering: pixelated;
  width: 18px;
  height: 18px;
  object-fit: cover;
}

.leaflet-popup-content-wrapper {
  background: #3a0202e5;
  border: 3px solid #bb0303;
  border-radius: 0;
  color: white;
  box-shadow: 3px 3px 0 #000;
}

.leaflet-popup-tip { background: #000000; }
.leaflet-popup-content { margin: 10px 14px; }

#categoriaBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 1000;
  width: auto;
  padding: 6px 10px;
}

/* ── Overlay / Modal ── */
#overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
}

#overlay.open {
  display: flex;
}

.modal {
  background: #0d0d0d;
  border: 4px solid #8b0000;
  width: 300px;
  position: relative;
  font-family: 'Press Start 2P', cursive;
}

.modal-top-bar {
  background: #8b0000;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#modal-bar-title {
  font-size: 7px;
  color: #fff;
  letter-spacing: 1px;
}

#modal-close-btn {
  background: #ff2222;
  border: 2px solid #fff;
  color: #fff;
  font-family: 'Press Start 2P', cursive;
  font-size: 8px;
  width: 22px;
  height: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

#modal-close-btn:hover { background: #cc0000; }

.modal-img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  display: block;
  image-rendering: pixelated;
  filter: contrast(1.1) saturate(0.85);
  border-bottom: 3px solid #8b0000;
}

.modal-img-placeholder {
  width: 100%;
  height: 130px;
  background: #1a1a1a;
  border-bottom: 3px solid #8b0000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
}

.modal-body { padding: 14px; }

#modal-cat {
  font-size: 6px;
  color: #8b0000;
  letter-spacing: 2px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

#modal-name {
  font-size: 9px;
  color: #7CFC00;
  margin-bottom: 10px;
  line-height: 1.6;
}

#modal-desc {
  font-size: 7px;
  color: #bbb;
  line-height: 1.9;
  border-left: 3px solid #8b0000;
  padding-left: 8px;
}

.modal-footer {
  border-top: 2px solid #222;
  padding: 10px 14px;
  display: flex;
  gap: 8px;
}

.modal-footer button {
  font-size: 6px;
  padding: 6px 10px;
  flex: 1;
  display: block;
  width: auto;
}

.modal-footer .btn-primary {
  border-color: #7CFC00;
  color: #7CFC00;
  background: #1a1a1a;
}

.modal-footer .btn-primary:hover {
  background: #7CFC00;
  color: #000;
  border-color: #7CFC00;
}

/* Esquinas pixel */
.pixel-corner {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #ff2222;
}
.pc-tl { top: -1px; left: -1px; }
.pc-tr { top: -1px; right: -1px; }
.pc-bl { bottom: -1px; left: -1px; }
.pc-br { bottom: -1px; right: -1px; }
</style>
</head>

<body>

<div id="loading">⏳ CARGANDO MAPA...</div>

<button id="categoriaBtn">
  <img width="30" height="30" src="https://img.icons8.com/ios/50/FFFFFF/menu--v1.png" alt="menu"/>
</button>

<div id="leyenda" style="display:none">
  <div style="font-size:15px;margin-bottom:8px;color:#ff0000">Categoria</div>
  <div class="ley-row"><img src="https://pbs.twimg.com/media/GZvlAwaagAABbPx.jpg"> Restaurante</div>
  <div class="ley-row"><img src="https://pbs.twimg.com/media/GjnTdKDXAAA0C7v.jpg"> Café Teto</div>
  <div class="ley-row"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTz3OvSdpqrlsghf9oHIM2J2dE-edzVoBaQ8A&s"> Bar</div>
  <div class="ley-row"><img src="https://www.dondeir.com/wp-content/uploads/2024/05/vocaloid-exposicion-cdmx.jpg"> Museo</div>
  <div class="ley-row"><img src="https://i.pinimg.com/236x/e1/1b/0a/e11b0a9e77d9a1b405cc119d806424cf.jpg"> Hotel</div>
  <div class="ley-row"><img src="https://preview.redd.it/why-do-yall-call-this-teto-dr-kidori-v0-dm5b7fgbtv2f1.jpeg?auto=webp&s=96c454d243c914a9707218c50275e0aad4f1f95b"> Hospital</div>
  <div class="ley-row"><img src="https://preview.redd.it/highschool-teto-v0-tz6md2by5jhf1.png?width=1300&format=png&auto=webp&s=4555235838e1046f37f7402bad664930c82cda84"> Escuela</div>
  <div class="ley-row"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbl1hwNUCk2XfGoFEOD5Ks4_iGspSNjaqbYw&s"> Histórico</div>
  <div class="ley-row"><img src="https://preview.redd.it/any-guide-on-what-to-do-when-your-teto-plush-started-talking-v0-g890tf0bp8df1.png?auto=webp&s=20d8409b87280f54ed1965e3e4a9ba6303b2eac1"> Banco</div>
</div>

<div id="map"></div>

<!-- ── Modal overlay ── -->
<div id="overlay">
  <div class="modal">
    <div class="pixel-corner pc-tl"></div>
    <div class="pixel-corner pc-tr"></div>
    <div class="pixel-corner pc-bl"></div>
    <div class="pixel-corner pc-br"></div>
    <div class="modal-top-bar">
      <span id="modal-bar-title">INFO</span>
      <button id="modal-close-btn" onclick="closeOverlay()">X</button>
    </div>
    <div id="modal-media"></div>
    <div class="modal-body">
      <div id="modal-cat">Categoría</div>
      <div id="modal-name">Nombre</div>
      <div id="modal-desc">Descripción</div>
    </div>
    <div class="modal-footer">
      <button onclick="closeOverlay()">Cerrar</button>
      <button class="btn-primary" id="modal-link-btn" onclick="abrirLink()">Ver más</button>
    </div>
  </div>
</div>

<script>

// ── Botón leyenda ──────────────────────────────────────────────────
document.getElementById('categoriaBtn').addEventListener('click', () => {
  const leyenda = document.getElementById('leyenda');
  leyenda.style.display = leyenda.style.display === 'none' ? 'block' : 'none';
});

// ── Mapa ───────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([32.6245, -115.4523], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// ── Overlay: abrir y cerrar ────────────────────────────────────────
let modalLinkUrl = '';

function openOverlay(data) {
  document.getElementById('modal-bar-title').textContent = (data.title || 'INFO').toUpperCase().slice(0, 18);
  document.getElementById('modal-name').textContent      = data.title       || 'Sin nombre';
  document.getElementById('modal-cat').textContent       = (data.cat        || '').toUpperCase();
  document.getElementById('modal-desc').textContent      = data.desc        || '';
  modalLinkUrl = data.link || '';

  const media = document.getElementById('modal-media');
  media.innerHTML = data.img
    ? `<img class="modal-img" src="${data.img}" onerror="this.parentNode.innerHTML='<div class=modal-img-placeholder>📍</div>'">`
    : `<div class="modal-img-placeholder">📍</div>`;

  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
}

function abrirLink() {
  if (modalLinkUrl) window.open(modalLinkUrl, '_blank');
}

// Cerrar al hacer clic en el fondo oscuro
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeOverlay();
});

// Cerrar con ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeOverlay();
});

// ── Modelos de markers personalizados ─────────────────────────────
const MARKER_MODELS = {
  'casa-churro': {
    iconUrl: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLgwwPM1BugLqVrvkg7Z-WZmJBm8_ifg-CRQ&s',
    size: [40, 40],
    popup: {
      title: 'Casa del Churro',
      cat:   'Restaurante',
      desc:  'El lugar favorito del barrio para desayunar.',
      img:   'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLgwwPM1BugLqVrvkg7Z-WZmJBm8_ifg-CRQ&s',
      link:  '',
    }
  },
  'casa-letty': {
    iconUrl: 'https://periodicocorreo.com.mx/__export/sites/correo/img/2022/08/12/destruccion-de-oxxo-en-Guanajuato-820365497.jpg',
    size: [40, 40],
    popup: {
      title: 'Casa de Letty',
      cat:   'Hogar',
      desc:  'El punto de reunión de siempre.',
      img:   'https://periodicocorreo.com.mx/__export/sites/correo/img/2022/08/12/destruccion-de-oxxo-en-Guanajuato-820365497.jpg',
      link:  '',
    }
  },
};

// ── Factory: crea icono desde modelo ──────────────────────────────
function buildIcon(model) {
  const [w, h] = model.size || [40, 40];
  const inner = model.iconUrl
    ? `<img src="${model.iconUrl}" width="${w}" height="${h}" style="object-fit:cover;border-radius:3px;image-rendering:pixelated;">`
    : `<span style="font-size:${w * 0.5}px">${model.emoji || '📍'}</span>`;

  return L.divIcon({
    html: `<div style="
      width:${w}px;height:${h}px;
      background:#1a1a1a;
      border:3px solid #666;
      border-radius:4px;
      box-shadow:3px 3px 0 #000;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    ">${inner}</div>`,
    className: '',
    iconSize: [w, h],
    iconAnchor: [w / 2, h],
    popupAnchor: [0, -h],
  });
}

// ── Agrega un marker del modelo al mapa ───────────────────────────
function addMarker(modelId, lat, lng) {
  const model = MARKER_MODELS[modelId];
  if (!model) return;
  const marker = L.marker([lat, lng], { icon: buildIcon(model) });
  marker.on('click', () => openOverlay(model.popup));
  marker.addTo(map);
  return marker;
}

// ── Markers personalizados ────────────────────────────────────────
addMarker('casa-churro', 32.620, -115.480);
addMarker('casa-letty',  32.63530003199846, -115.44225505368144);

// ── Jugador (geolocalización) ─────────────────────────────────────
const playerIcon = L.icon({
  iconUrl:   'https://i.pinimg.com/originals/80/23/9d/80239d4ac2c183b7f35586a425dd324f.png',
  iconSize:  [40, 40],
  iconAnchor:[24, 48],
  popupAnchor:[0, -50]
});

let playerMarker;
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(function(pos) {
    const { latitude: lat, longitude: lng } = pos.coords;
    if (playerMarker) {
      playerMarker.setLatLng([lat, lng]);
    } else {
      playerMarker = L.marker([lat, lng], { icon: playerIcon })
        .bindPopup('<b style="font-size:9px">Estás aquí</b>')
        .addTo(map);
    }
  }, err => console.error('Geolocalización:', err.message));
}

// ── Iconos POI por categoría ──────────────────────────────────────
const iconoURLs = {
  restaurant: 'https://pbs.twimg.com/media/GZvlAwaagAABbPx.jpg',
  cafe:       'https://pbs.twimg.com/media/GjnTdKDXAAA0C7v.jpg',
  bar:        'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTz3OvSdpqrlsghf9oHIM2J2dE-edzVoBaQ8A&s',
  museum:     'https://www.dondeir.com/wp-content/uploads/2024/05/vocaloid-exposicion-cdmx.jpg',
  hotel:      'https://i.pinimg.com/236x/e1/1b/0a/e11b0a9e77d9a1b405cc119d806424cf.jpg',
  hospital:   'https://preview.redd.it/why-do-yall-call-this-teto-dr-kidori-v0-dm5b7fgbtv2f1.jpeg?auto=webp&s=96c454d243c914a9707218c50275e0aad4f1f95b',
  school:     'https://preview.redd.it/highschool-teto-v0-tz6md2by5jhf1.png?width=1300&format=png&auto=webp&s=4555235838e1046f37f7402bad664930c82cda84',
  bank:       'https://preview.redd.it/any-guide-on-what-to-do-when-your-teto-plush-started-talking-v0-g890tf0bp8df1.png?auto=webp&s=20d8409b87280f54ed1965e3e4a9ba6303b2eac1',
  park:       'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbl1hwNUCk2XfGoFEOD5Ks4_iGspSNjaqbYw&s',
  default:    'https://cdn-icons-png.flaticon.com/32/684/684908.png',
};

const iconCache = {};

function crearIcono(tipo) {
  const key = iconoURLs[tipo] ? tipo : 'default';
  if (iconCache[key]) return iconCache[key];
  iconCache[key] = L.divIcon({
    html: `<div style="
      width:36px;height:36px;
      background:#1a1a1a;
      border:3px solid #666;
      border-radius:4px;
      box-shadow:3px 3px 0 #000;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    ">
      <img src="${iconoURLs[key]}" width="34" height="34"
           style="image-rendering:pixelated;display:block;object-fit:cover;border-radius:3px;">
    </div>`,
    className: '',
    iconSize:   [36, 36],
    iconAnchor: [18, 36],
    popupAnchor:[0, -36]
  });
  return iconCache[key];
}

// ── Carga de POIs desde Overpass ──────────────────────────────────
let marcadoresPOI = [];
let cargando = false;
const loadingEl = document.getElementById('loading');

async function cargarPOIs() {
  if (cargando) return;
  cargando = true;
  loadingEl.style.display = 'block';

  marcadoresPOI.forEach(m => map.removeLayer(m));
  marcadoresPOI = [];

  const b    = map.getBounds();
  const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;

  const query = `
    [out:json][timeout:25];
    (
      node[amenity=restaurant](${bbox});
      node[amenity=cafe](${bbox});
      node[amenity=bar](${bbox});
      node[amenity=hospital](${bbox});
      node[amenity=school](${bbox});
      node[amenity=bank](${bbox});
      node[leisure=park](${bbox});
    );
    out body;
  `;

  try {
    const res  = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: query });
    const data = await res.json();

    data.elements.forEach(poi => {
      if (!poi.lat || !poi.lon) return;

      const nombre = poi.tags.name || 'Sin nombre';
      const tipo   = poi.tags.amenity || poi.tags.leisure || poi.tags.tourism || 'default';

      const poiData = {
        title: nombre,
        cat:   tipo,
        desc:  `${tipo.charAt(0).toUpperCase() + tipo.slice(1)} en Mexicali`,
        img:   '',
      };

      const marker = L.marker([poi.lat, poi.lon], { icon: crearIcono(tipo) });
      marker.on('click', () => openOverlay(poiData));
      marker.addTo(map);
      marcadoresPOI.push(marker);
    });

  } catch (e) {
    console.error('Error cargando POIs:', e);
  }

  cargando = false;
  loadingEl.style.display = 'none';
}

cargarPOIs();

let timer;
map.on('moveend', () => {
  clearTimeout(timer);
  timer = setTimeout(cargarPOIs, 800);
});

</script>
</body>
</html>
