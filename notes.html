<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/colIMG.css">
  <title>Swipe Img</title>
</head>

<body>

  <aside class="sidebar">
    <ul class="sidebar_list">

      <!-- Logo / Título -->
      <li class="sidebar_element sidebar_element--logo">
        <img class="sidebar_icon sidebar_icon--logo" src="./imagenes/tortugabailando.gif" alt="logo">
        <div class="sidebar_hide">
          <p class="sidebar_text sidebar_text--logo">Somea</p>
        </div>
      </li>

      <!-- Inicio -->
      <li class="sidebar_element" onclick="scrollToSection('inicio')">
        <svg class="sidebar_icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
        <div class="sidebar_hide">
          <a href="./index.html">
            <p class="sidebar_text">Inicio</p>
          </a>
        </div>
      </li>

      <!-- Sobre mí -->
      <a href="./proyectos.html">
        <li class="sidebar_element">
          <svg class="sidebar_icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
          </svg>
          <div class="sidebar_hide">
            <p class="sidebar_text">Proyectos</p>
          </div>
        </li>
      </a>

      <!-- Intereses -->
      <li class="sidebar_element">
        <svg class="sidebar_icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
        <div class="sidebar_hide">
          <p class="sidebar_text">Proyectos</p>
        </div>
      </li>


      <!-- Redes sociales -->
      <li class="sidebar_element" onclick="scrollToSection('redes')">
        <svg class="sidebar_icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z" />
        </svg>
        <div class="sidebar_hide">
          <p class="sidebar_text">Redes</p>
        </div>
      </li>

    </ul>
  </aside>

  <main>

    <header>

      <!-- <div class="logo">★Mira imagenes una por una★</div> -->
      <p id="help-text" style="display:none">Al buscar una imagen intenta poner espacios entre las palabras, si no, ve a
        ayuda en el menu</p>
      <div class="filter-row">
        <input type="text" id="search-input" class="filter-btn"
          placeholder="BUSCAR... (ej: 'hatsune miku' o 'sao series')" oninput="searchTags(this.value)"
          onkeydown="if(event.key === 'Enter') { selectTag(formatTag(this.value)); hideDropdown(); }"
          autocomplete="off">
        <div id="tag-dropdown"></div>
      </div>
    </header>


    <div id="card-stack">
      <div class="behind-card-2"></div>
      <div class="behind-card"></div>
      <div id="loading-msg" class="state-msg">Cargando...<br>pls wait ♪</div>
    </div>

    <div class="counter" id="counter"></div>

    <div class="actions">
      <button class="action-btn btn-nope" onclick="swipe('nope')">
        <span class="btn-icon">✕</span> SKIP
      </button>
      <button class="action-btn btn-like" onclick="swipe('like')">
        SAVE <span class="btn-icon">♥</span>
      </button>
      <button onclick="downloadImage(posts[idx].large_file_url)"><img width="40" height="40"
          src="https://img.icons8.com/comic/40/1A1A1A/download.png" alt="download" /></button>
    </div>

    <button class="collection-toggle" onclick="toggleCollection()">
      ★ Mi coleccion
      <span class="collection-count" id="col-count">0</span>
    </button>
  </main>

  <div id="collection-panel">
    <div class="collection-header">
      <span class="collection-title">Guardadas</span>
      <button class="btn-clear" onclick="clearCollection()">Borrar todo</button>
    </div>
    <div id="collection-grid"></div>
  </div>

  <div id="preview-modal" onclick="closePreview()">
    <div class="modal-inner" onclick="event.stopPropagation()">
      <img id="preview-img" src="" alt="">
      <div class="modal-info">
        <span id="preview-artist"></span>
        <a id="preview-link" href="" target="_blank">ver en danbooru ↗</a>
      </div>
      <button class="modal-close" onclick="closePreview()">✕ CERRAR</button>
    </div>
  </div>

  <img src="./imagenes/tetoplush.png" id="tetopeluche">


  <script>
    let posts = [];
    let idx = 0;
    let currentTag = 'hatsune_miku';
    let collection = JSON.parse(localStorage.getItem('somea-collection') || '[]');
    let isDragging = false;
    let startX = 0, startY = 0;
    let currentCard = null;
    const cardteto = document.getElementById('card-stack');

    // ── fetch ──
    async function loadPosts(tag) {
      document.getElementById('loading-msg').style.display = 'block';
      removeCurrentCard();

      const params = new URLSearchParams({
        tags: `${tag} rating:general`,
        limit: 101,
        page: Math.ceil(Math.random() * 3),
      });

      try {
        const res = await fetch(`https://danbooru.donmai.us/posts.json?${params}`);
        const data = await res.json();
        posts = data.filter(p =>
          p.preview_file_url &&
          p.large_file_url &&
          !['zip', 'webm', 'mp4'].includes(p.file_ext)
        );
        idx = 0;
        document.getElementById('loading-msg').style.display = 'none';
        if (posts.length === 0) {
          showMsg('Intenta otro filtro');
        } else {
          showCard();
        }
      } catch (e) {
        showMsg('ERROR DE RED\nrevisa tu conexión');
      }
    }

    cardteto.addEventListener('dblclick', () => {
      if (posts.length === 0 || idx >= posts.length) return;
      openPreview(posts[idx]);
    });

    function openPreview(post) {
      document.getElementById('preview-img').src = post.large_file_url || post.preview_file_url;
      document.getElementById('preview-artist').textContent = post.tag_string_artist?.split(' ')[0] || 'unknown';
      document.getElementById('preview-link').href = `https://danbooru.donmai.us/posts/${post.id}`;
      document.getElementById('preview-modal').classList.add('open');
    }

    function closePreview() {
      document.getElementById('preview-modal').classList.remove('open');
      document.getElementById('preview-img').src = '';
    }



    // cerrar con Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePreview();
    });

    function showMsg(text) {
      const el = document.getElementById('loading-msg');
      el.textContent = text;
      el.style.display = 'block';
    }

    // ── render card ──
    function showCard() {
      removeCurrentCard();

      if (idx >= posts.length) {
        loadPosts(currentTag);
        return;
      }

      const post = posts[idx];
      updateCounter();

      const card = document.createElement('div');
      card.className = 'art-card';
      card.id = 'current-card';


      const img = document.createElement('img');
      img.src = post.large_file_url || post.preview_file_url;
      img.loading = 'lazy';
      img.alt = '';
      img.onerror = () => { idx++; showCard(); };

      const overlay = document.createElement('div');
      overlay.className = 'card-overlay';

      const artist = document.createElement('div');
      artist.className = 'card-artist';
      artist.textContent = post.tag_string_artist?.split(' ')[0] || 'unknown artist';

      const tags = document.createElement('div');
      tags.className = 'card-tags';
      tags.textContent = post.tag_string_character?.replaceAll('_', ' ') || '';

      const stampLike = document.createElement('div');
      stampLike.className = 'stamp stamp-like';
      stampLike.id = 'stamp-like';
      stampLike.textContent = 'SAVE!';

      const stampNope = document.createElement('div');
      stampNope.className = 'stamp stamp-nope';
      stampNope.id = 'stamp-nope';
      stampNope.textContent = 'SKIP';

      overlay.append(artist, tags);

      card.append(img, overlay, stampLike, stampNope);

      const stack = document.getElementById('card-stack');
      stack.appendChild(card);
      currentCard = card;

      setupDrag(card, post);
    }

    function removeCurrentCard() {
      const old = document.getElementById('current-card');
      // remove event listeners
      if (old) old.remove();

    }

    function updateCounter() {
      const el = document.getElementById('counter');
      el.textContent = posts.length ? `${idx + 1} / ${posts.length}` : '';
    }

    // ── drag logic ──
    function setupDrag(card, post) {
      let velX = 0;
      let dragging = false;
      let localStartX = 0;

      const onStart = (e) => {
        dragging = true;
        const pt = e.touches ? e.touches[0] : e;
        localStartX = pt.clientX;
        card.style.transition = 'none';
      };

      const onMove = (e) => {
        if (!dragging) return;
        const pt = e.touches ? e.touches[0] : e;
        const dx = pt.clientX - localStartX;
        const dy = pt.clientY - startY;
        const rotate = dx * 0.08;

        card.style.transform = `translateX(${dx}px) translateY(${dy * 0.3}px) rotate(${rotate}deg)`;

        velX = dx;

        const likeStamp = card.querySelector('.stamp-like');
        const nopeStamp = card.querySelector('.stamp-nope');
        const ratio = Math.abs(dx) / 80;

        if (dx > 20) {
          likeStamp.style.opacity = Math.min(ratio, 1);
          nopeStamp.style.opacity = 0;
        } else if (dx < -20) {
          nopeStamp.style.opacity = Math.min(ratio, 1);
          likeStamp.style.opacity = 0;
        } else {
          likeStamp.style.opacity = 0;
          nopeStamp.style.opacity = 0;
        }
      };

      const onEnd = () => {
        if (!dragging) return;
        dragging = false;

        if (velX > 80) {
          animateOut(card, 'like', post);
        } else if (velX < -80) {
          animateOut(card, 'nope', post);
        } else {
          // snap back
          card.style.transition = 'transform 0.35s cubic-bezier(.175,.885,.32,1.275)';
          card.style.transform = 'translateX(0) translateY(0) rotate(0deg)';
          card.querySelectorAll('.stamp').forEach(s => s.style.opacity = 0);
        }
      };

      card.addEventListener('mousedown', onStart);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);

      card.addEventListener('touchstart', onStart, { passive: true });
      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('touchend', onEnd);
    }

    // ── swipe action ──
    function swipe(dir) {
      if (!currentCard) return;
      const post = posts[idx];
      animateOut(currentCard, dir, post);
    }

    function animateOut(card, dir, post) {
      const xOut = dir === 'like' ? 600 : -600;  // ← número, no el string dir

      card.style.transition = 'transform 0.38s ease-in, opacity 0.38s';
      card.style.transform = `translateX(${xOut}px) rotate(${dir === 'like' ? 20 : -20}deg)`;
      card.style.opacity = '0';

      if (dir === 'like') saveToCollection(post);  // ← solo una vez, afuera del if anterior

      setTimeout(() => {
        card.remove();
        idx++;
        showCard();
      }, 380);
    }

    // ── collection ──
    function saveToCollection(post) {
      if (collection.find(p => p.id === post.id)) return;
      collection.push({
        id: post.id,
        preview: post.preview_file_url,
        large: post.large_file_url,
        artist: post.tag_string_artist?.split(' ')[0] || '',
        tags: post.tag_string_character || '',
        url: `https://danbooru.donmai.us/posts/${post.id}`,
      });
      localStorage.setItem('somea-collection', JSON.stringify(collection));
      updateColCount();
      renderCollection();
    }

    function removeFromCollection(id) {
      collection = collection.filter(p => p.id !== id);
      localStorage.setItem('somea-collection', JSON.stringify(collection));
      updateColCount();
      renderCollection();
    }

    function clearCollection() {
      if (!confirm('¿Borrar toda la colección?')) return;
      collection = [];
      localStorage.setItem('somea-collection', JSON.stringify(collection));
      updateColCount();
      renderCollection();
    }

    function updateColCount() {
      document.getElementById('col-count').textContent = collection.length;
    }

    function renderCollection() {
      const grid = document.getElementById('collection-grid');
      grid.innerHTML = '';

      if (collection.length === 0) {
        grid.innerHTML = '<div class="empty-collection" style="grid-column:1/-1">ninguna guardada aún<br>desliza a la derecha ♥</div>';
        return;
      }

      collection.forEach(item => {
        const thumb = document.createElement('div');
        thumb.className = 'col-thumb';
        thumb.onclick = () => window.open(item.url, '_blank');

        const img = document.createElement('img');
        img.src = item.preview;
        img.alt = item.artist;

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '✕';
        removeBtn.onclick = (e) => { e.stopPropagation(); removeFromCollection(item.id); };

        thumb.append(img, removeBtn);
        grid.appendChild(thumb);
      });
    }

    function toggleCollection() {
      const panel = document.getElementById('collection-panel');
      panel.classList.toggle('open');

      if (panel.classList.contains('open')) {
        const searchInput = document.getElementById('search-collection'); // ← mismo id que el HTML
        if (searchInput) searchInput.value = '';
      }

      renderCollection();
    }

    // ── switch character ──
    function switchChar(tag, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active', 'active-miku', 'active-teto');
      });
      btn.classList.add('active');
      if (tag === 'hatsune_miku') btn.classList.add('active-miku');
      if (tag === 'kasane_teto') btn.classList.add('active-teto');
      currentTag = tag;
      loadPosts(tag);
    }

    let txt = document.getElementById('help-text');

    let pleuche = document.getElementById('tetopeluche');
    pleuche.addEventListener('click', () => {
      txt.style.display = txt.style.display === 'none' ? 'block' : 'none';
    });


    function downloadImage(large_file_url) {
      fetch(large_file_url)
        .then(resp => resp.blob())
        .then(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = large_file_url.split('/').pop();
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
        })
        .catch(() => alert('Error al descargar la imagen'));
    }

    let searchTimeout = null;

    async function searchTags(input) {
      input = input.trim();
      if (input.length < 2) { hideDropdown(); return; }

      // debounce — espera 300ms después de que el usuario deje de escribir
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(async () => {
        const query = input.toLowerCase().replace(/\s+/g, '_');

        // busca personajes Y series al mismo tiempo
        const [characters, series] = await Promise.all([
          fetch(`https://danbooru.donmai.us/tags.json?search[name_matches]=${query}*&search[category]=4&limit=6`)
            .then(r => r.json()).catch(() => []),
          fetch(`https://danbooru.donmai.us/tags.json?search[name_matches]=${query}*&search[category]=3&limit=4`)
            .then(r => r.json()).catch(() => []),
        ]);

        const results = [
          ...characters.map(t => ({ ...t, type: 'character' })),
          ...series.map(t => ({ ...t, type: 'series' })),
        ];

        renderDropdown(results);
      }, 300);
    }

    function renderDropdown(tags) {
      const dropdown = document.getElementById('tag-dropdown');

      if (tags.length === 0) { hideDropdown(); return; }

      dropdown.innerHTML = '';

      tags.forEach(tag => {
        const div = document.createElement('div');
        div.className = 'tag-option';

        const name = tag.name.replaceAll('_', ' '); // muestra sin guiones
        const count = tag.post_count?.toLocaleString() || '0';
        const type = tag.type;

        div.innerHTML = `
      <span class="tag-name">${name}</span>
      <span class="tag-category ${type}">${type === 'character' ? 'personaje' : 'serie'}</span>
      <span class="tag-count">${count} posts</span>
    `;

        div.onclick = () => {
          selectTag(tag.name); // usa el nombre real con guiones bajos
          document.getElementById('search-input').value = name; // muestra bonito
          hideDropdown();
        };

        dropdown.appendChild(div);
      });

      dropdown.classList.add('open');
    }

    function selectTag(tag) {
      currentTag = tag;
      loadPosts(tag);
    }

    function hideDropdown() {
      document.getElementById('tag-dropdown').classList.remove('open');
      clearTimeout(searchTimeout);
    }

    // cierra el dropdown al hacer click fuera
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.filter-row')) hideDropdown();
    });

    // ── init ──
    updateColCount();
    loadPosts(currentTag);
  </script>
</body>

</html>
